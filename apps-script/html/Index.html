<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wine QC System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      background: #f5f5f5;
      color: #1a1a1a;
    }

    /* -- Nav -- */
    nav {
      background: #1e3a2f;
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 24px;
      height: 52px;
      gap: 32px;
    }
    nav .app-title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
      flex-shrink: 0;
    }
    nav .nav-links { display: flex; gap: 4px; }
    nav .nav-link {
      color: #c8d8d0;
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      background: none;
      border: none;
      font-size: 14px;
      transition: background 0.15s, color 0.15s;
    }
    nav .nav-link:hover { background: rgba(255,255,255,0.1); color: #fff; }
    nav .nav-link.active { background: rgba(255,255,255,0.15); color: #fff; }

    /* -- Main content -- */
    main { padding: 28px 32px; max-width: 1200px; }

    section { display: none; }
    section.active { display: block; }

    h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #1a1a1a;
    }

    /* -- Dashboard table -- */
    .table-container {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      overflow: hidden;
    }
    .table-header {
      padding: 16px 20px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .table-header span { font-weight: 600; font-size: 15px; }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      text-align: left;
      padding: 10px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #64748b;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }
    tbody tr {
      border-bottom: 1px solid #f1f5f9;
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8fafc; }
    td { padding: 12px 16px; vertical-align: middle; }

    /* -- Status badges -- */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
    }
    .badge-active         { background: #dbeafe; color: #1d4ed8; }
    .badge-pending        { background: #fef3c7; color: #92400e; }
    .badge-approved       { background: #dcfce7; color: #15803d; }
    .badge-in-production  { background: #fee2e2; color: #b91c1c; }
    .badge-completed      { background: #f1f5f9; color: #475569; }

    /* -- Buttons -- */
    .btn {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary   { background: #1e3a2f; color: #fff; }
    .btn-secondary { background: #fff; color: #374151; border-color: #d1d5db; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* -- State messages -- */
    .state-message {
      padding: 40px;
      text-align: center;
      color: #64748b;
    }
    .state-message.error { color: #b91c1c; }

    /* -- New Run form -- */
    .form-card {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      padding: 28px;
      max-width: 640px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full-width { grid-column: 1 / -1; }
    label {
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    input[type="text"],
    input[type="number"],
    input[type="date"] {
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 5px;
      font-size: 14px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #1e3a2f; }
    input.error-field { border-color: #dc2626; }

    .form-actions { display: flex; gap: 10px; align-items: center; margin-top: 4px; }

    /* -- Alerts -- */
    .alert {
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 13px;
      margin-top: 16px;
      display: none;
    }
    .alert.visible { display: block; }
    .alert-success { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
    .alert-error   { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }

    /* -- Refresh button -- */
    .refresh-btn {
      background: none;
      border: 1px solid #d1d5db;
      border-radius: 5px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      color: #374151;
    }
    .refresh-btn:hover { background: #f1f5f9; }
  </style>
</head>
<body>

<nav>
  <span class="app-title">Wine QC System</span>
  <div class="nav-links">
    <button id="nav-dashboard" class="nav-link active" onclick="showSection('dashboard', 'nav-dashboard')">Dashboard</button>
    <button id="nav-new-run"   class="nav-link"        onclick="showSection('new-run',   'nav-new-run')">New Run</button>
  </div>
</nav>

<main>

  <!-- Dashboard section -->
  <section id="dashboard-section" class="active">
    <h2>Bottling Runs</h2>
    <div class="table-container">
      <div class="table-header">
        <span id="runs-count">Loading...</span>
        <button class="refresh-btn" onclick="loadDashboard()">Refresh</button>
      </div>
      <div id="dashboard-state">
        <div class="state-message">Loading runs...</div>
      </div>
    </div>
  </section>

  <!-- New Run section -->
  <section id="new-run-section">
    <h2>Create New Run</h2>
    <div class="form-card">
      <form id="new-run-form" onsubmit="submitNewRun(event)">
        <div class="form-grid">
          <div class="form-group">
            <label for="f-wine">Wine Name</label>
            <input type="text" id="f-wine" name="WINE" placeholder="e.g. Big White" required>
          </div>
          <div class="form-group">
            <label for="f-vintage">Vintage</label>
            <input type="number" id="f-vintage" name="VINTAGE" placeholder="e.g. 2024" min="1900" max="2100" required>
          </div>
          <div class="form-group">
            <label for="f-vintrace">Vintrace ID</label>
            <input type="text" id="f-vintrace" name="VINTRACE_ID" placeholder="e.g. VT-1234" required>
          </div>
          <div class="form-group">
            <label for="f-tanks">Tank Numbers</label>
            <input type="text" id="f-tanks" name="TANK_NUMBERS" placeholder="e.g. T14, T15" required>
          </div>
          <div class="form-group">
            <label for="f-volume">Volume (litres)</label>
            <input type="number" id="f-volume" name="VOLUME" placeholder="e.g. 15000" min="0" step="0.01" required>
          </div>
          <div class="form-group">
            <label for="f-bottling-date">Bottling Date</label>
            <input type="date" id="f-bottling-date" name="BOTTLING_DATE" required>
          </div>
          <div class="form-group">
            <label for="f-num-days">Number of Days</label>
            <input type="number" id="f-num-days" name="NUM_DAYS" placeholder="e.g. 2" min="1" required>
          </div>
          <div class="form-group">
            <label for="f-winemaker">Winemaker</label>
            <input type="text" id="f-winemaker" name="WINEMAKER" placeholder="e.g. Jane Smith" required>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submit-btn">Create Run</button>
          <button type="button" class="btn btn-secondary" onclick="resetNewRunForm()">Clear</button>
          <span id="submit-spinner" style="display:none; color:#64748b; font-size:13px;">Saving...</span>
        </div>

        <div id="form-alert" class="alert"></div>
      </form>
    </div>
  </section>

  <!-- Run Detail section -->
  <section id="run-detail-section">
    <div id="run-detail-content">
      <div class="state-message">Loading...</div>
    </div>
  </section>

</main>

<script>
  // -- Navigation --

  // navId is the ID of the nav button to mark active; omit for sections with no nav entry (run detail).
  function showSection(name, navId) {
    document.querySelectorAll('section').forEach(function(s) { s.classList.remove('active'); });
    document.querySelectorAll('.nav-link').forEach(function(l) { l.classList.remove('active'); });
    document.getElementById(name + '-section').classList.add('active');
    if (navId) {
      var btn = document.getElementById(navId);
      if (btn) btn.classList.add('active');
    }
  }

  function goToDashboard() {
    showSection('dashboard', 'nav-dashboard');
  }

  // -- Dashboard --

  function loadDashboard() {
    setDashboardState('loading');
    google.script.run
      .withSuccessHandler(onRunsLoaded)
      .withFailureHandler(onRunsError)
      .serverGetAllRuns();
  }

  function onRunsLoaded(result) {
    console.log('[DEBUG] onRunsLoaded received:', JSON.stringify(result));
    if (!result) {
      document.getElementById('runs-count').textContent = 'Error';
      document.getElementById('dashboard-state').innerHTML =
        '<div class="state-message error">Error: server returned empty response. Check Apps Script logs.</div>';
      return;
    }
    if (!result.success) {
      onRunsError(result.error);
      return;
    }
    var runs = result.data;
    var countEl = document.getElementById('runs-count');
    var stateEl = document.getElementById('dashboard-state');

    if (!runs || runs.length === 0) {
      countEl.textContent = '0 runs';
      stateEl.innerHTML = '<div class="state-message">No runs found. Create one to get started.</div>';
      return;
    }

    countEl.textContent = runs.length + ' run' + (runs.length === 1 ? '' : 's');

    var rows = runs.map(function(run) {
      var date = run.BOTTLING_DATE ? formatDisplayDate(run.BOTTLING_DATE) : '--';
      return '<tr>' +
        '<td><strong>' + esc(run.RUN_ID) + '</strong></td>' +
        '<td>' + esc(run.WINE) + '</td>' +
        '<td>' + esc(String(run.VINTAGE)) + '</td>' +
        '<td>' + statusBadge(run.STATUS) + '</td>' +
        '<td>' + date + '</td>' +
        '<td>' + esc(run.WINEMAKER || '--') + '</td>' +
        '<td><button class="btn btn-secondary btn-sm" onclick="viewRun(\'' + esc(run.RUN_ID) + '\')">View</button></td>' +
        '</tr>';
    }).join('');

    stateEl.innerHTML =
      '<table>' +
        '<thead><tr>' +
          '<th>Run ID</th><th>Wine</th><th>Vintage</th><th>Status</th>' +
          '<th>Bottling Date</th><th>Winemaker</th><th></th>' +
        '</tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>';
  }

  function onRunsError(err) {
    document.getElementById('runs-count').textContent = 'Error';
    document.getElementById('dashboard-state').innerHTML =
      '<div class="state-message error">Failed to load runs: ' + esc(String(err)) + '</div>';
  }

  function setDashboardState(state) {
    if (state === 'loading') {
      document.getElementById('runs-count').textContent = 'Loading...';
      document.getElementById('dashboard-state').innerHTML =
        '<div class="state-message">Loading runs...</div>';
    }
  }

  // -- Run Detail --

  function viewRun(runId) {
    showSection('run-detail', null);
    document.getElementById('run-detail-content').innerHTML =
      '<div class="state-message">Loading run ' + esc(runId) + '...</div>';

    google.script.run
      .withSuccessHandler(function(result) {
        if (!result || !result.success) {
          document.getElementById('run-detail-content').innerHTML =
            '<div class="state-message error">Failed to load run: ' +
            esc(result && result.error ? result.error : 'Unknown error') + '</div>';
          return;
        }
        document.getElementById('run-detail-content').innerHTML = _buildRunDetailHtml(result.data);
      })
      .withFailureHandler(function(err) {
        document.getElementById('run-detail-content').innerHTML =
          '<div class="state-message error">Server error: ' + esc(String(err)) + '</div>';
      })
      .serverGetRunById(runId);
  }

  // -- New Run form --

  function submitNewRun(event) {
    event.preventDefault();
    var form = document.getElementById('new-run-form');
    var btn = document.getElementById('submit-btn');
    var spinner = document.getElementById('submit-spinner');

    hideAlert();
    btn.disabled = true;
    spinner.style.display = 'inline';

    var formData = {
      WINE:          form.WINE.value.trim(),
      VINTAGE:       form.VINTAGE.value,
      VINTRACE_ID:   form.VINTRACE_ID.value.trim(),
      TANK_NUMBERS:  form.TANK_NUMBERS.value.trim(),
      VOLUME:        form.VOLUME.value,
      BOTTLING_DATE: form.BOTTLING_DATE.value,
      NUM_DAYS:      form.NUM_DAYS.value,
      WINEMAKER:     form.WINEMAKER.value.trim()
    };

    google.script.run
      .withSuccessHandler(function(result) {
        btn.disabled = false;
        spinner.style.display = 'none';
        if (result.success) {
          showAlert('success', 'Run created successfully. Run ID: ' + result.data.RUN_ID);
          form.reset();
          loadDashboard();
        } else {
          showAlert('error', result.error || 'Unknown error creating run.');
        }
      })
      .withFailureHandler(function(err) {
        btn.disabled = false;
        spinner.style.display = 'none';
        showAlert('error', 'Server error: ' + String(err));
      })
      .serverCreateRun(formData);
  }

  function resetNewRunForm() {
    document.getElementById('new-run-form').reset();
    hideAlert();
  }

  function showAlert(type, message) {
    var el = document.getElementById('form-alert');
    el.className = 'alert visible alert-' + type;
    el.textContent = message;
  }

  function hideAlert() {
    var el = document.getElementById('form-alert');
    el.className = 'alert';
    el.textContent = '';
  }

  // -- Helpers --

  function statusBadge(status) {
    var classMap = {
      'Active':            'badge-active',
      'Pending Approval':  'badge-pending',
      'Approved':          'badge-approved',
      'In Production':     'badge-in-production',
      'Completed':         'badge-completed'
    };
    var cls = classMap[status] || 'badge-completed';
    return '<span class="badge ' + cls + '">' + esc(status) + '</span>';
  }

  function formatDisplayDate(val) {
    if (!val) return '--';
    var d = new Date(val);
    if (isNaN(d.getTime())) return String(val);
    return d.toLocaleDateString('en-CA');
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // -- Init --
  loadDashboard();
</script>
