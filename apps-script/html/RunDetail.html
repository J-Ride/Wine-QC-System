<style>
  .rd-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: #1e3a2f;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    padding: 0;
    margin-bottom: 20px;
    text-decoration: none;
  }
  .rd-back:hover { text-decoration: underline; }

  .rd-header {
    margin-bottom: 24px;
  }
  .rd-run-id {
    font-size: 26px;
    font-weight: 700;
    color: #1a1a1a;
    line-height: 1.2;
  }
  .rd-subtitle {
    font-size: 15px;
    color: #64748b;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .rd-body {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 20px;
    align-items: start;
  }

  .rd-card {
    background: #fff;
    border-radius: 8px;
    border: 1px solid #e2e8f0;
    padding: 20px 24px;
  }
  .rd-card-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #64748b;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid #f1f5f9;
  }

  .rd-field {
    display: flex;
    padding: 7px 0;
    border-bottom: 1px solid #f8fafc;
    font-size: 13px;
  }
  .rd-field:last-child { border-bottom: none; }
  .rd-field-label {
    width: 160px;
    flex-shrink: 0;
    color: #64748b;
    font-weight: 500;
  }
  .rd-field-value { color: #1a1a1a; }
  .rd-field-value a { color: #1e3a2f; }

  .rd-action-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .rd-action-group + .rd-action-group {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid #f1f5f9;
  }
  .btn-action {
    width: 100%;
    padding: 9px 14px;
    border-radius: 5px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    text-align: center;
  }
  .btn-action:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-action-primary { background: #1e3a2f; color: #fff; border-color: #1e3a2f; }
  .btn-action-secondary { background: #fff; color: #374151; border-color: #d1d5db; }
  .btn-action-danger { background: #dc2626; color: #fff; border-color: #dc2626; }
  .btn-action-muted { background: #f1f5f9; color: #64748b; border-color: #e2e8f0; }

  .rd-spinner {
    display: none;
    text-align: center;
    padding: 8px 0;
    font-size: 12px;
    color: #64748b;
  }
  .rd-action-error {
    display: none;
    background: #fee2e2;
    color: #b91c1c;
    border: 1px solid #fecaca;
    border-radius: 5px;
    padding: 8px 12px;
    font-size: 12px;
    margin-top: 6px;
  }
  .rd-complete-msg {
    background: #dcfce7;
    color: #15803d;
    border: 1px solid #bbf7d0;
    border-radius: 6px;
    padding: 12px;
    font-size: 13px;
    text-align: center;
  }
  .rd-session-info {
    background: #fef3c7;
    border: 1px solid #fde68a;
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 12px;
    color: #92400e;
    margin-bottom: 10px;
  }
  .rd-approval-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    padding: 3px 0;
  }
  .rd-approval-done { color: #15803d; font-weight: 600; }
  .rd-approval-pending { color: #92400e; }
</style>

<script>
  // Track current run for refresh after actions
  var _rdCurrentRunId = null;

  function renderRunDetail(run) {
    _rdCurrentRunId = run.RUN_ID;
    var section = document.getElementById('run-detail-section');
    section.innerHTML = _buildRunDetailHtml(run);
  }

  function _buildRunDetailHtml(run) {
    var bottlingDate = run.BOTTLING_DATE ? formatDisplayDate(run.BOTTLING_DATE) : '--';
    var createdDate  = run.CREATED_DATE  ? formatDisplayDate(run.CREATED_DATE)  : '--';

    var folderCell = (run.FOLDER_LINK && run.FOLDER_LINK !== 'PENDING' && run.FOLDER_LINK !== '')
      ? '<a href="' + esc(run.FOLDER_LINK) + '" target="_blank">Open folder</a>'
      : '<span style="color:#94a3b8">PENDING</span>';

    var reportCell = (run.REPORT_LINK && run.REPORT_LINK !== 'PENDING' && run.REPORT_LINK !== '')
      ? '<a href="' + esc(run.REPORT_LINK) + '" target="_blank">Open report</a>'
      : '<span style="color:#94a3b8">PENDING</span>';

    var detailRows = [
      ['Vintrace ID',         esc(run.VINTRACE_ID   || '--')],
      ['Tank Numbers',        esc(run.TANK_NUMBERS   || '--')],
      ['Volume (L)',          esc(String(run.VOLUME  || '--'))],
      ['Bottling Date',       bottlingDate],
      ['Number of Days',      esc(String(run.NUM_DAYS || '--'))],
      ['Winemaker',           esc(run.WINEMAKER      || '--')],
      ['Created',             createdDate],
      ['Winemaker Approved',  _approvalBadge(run.WINEMAKER_APPROVED)],
      ['Lab Approved',        _approvalBadge(run.LAB_APPROVED)],
      ['Warehouse Approved',  _approvalBadge(run.WAREHOUSE_APPROVED)],
      ['Sessions Completed',  esc(String(run.NUM_SESSIONS || 0))],
      ['Report',              reportCell],
      ['Drive Folder',        folderCell]
    ].map(function(pair) {
      return '<div class="rd-field">' +
        '<span class="rd-field-label">' + pair[0] + '</span>' +
        '<span class="rd-field-value">' + pair[1] + '</span>' +
        '</div>';
    }).join('');

    return '' +
      '<button class="rd-back" onclick="goToDashboard()">&#8592; Back to Dashboard</button>' +

      '<div class="rd-header">' +
        '<div class="rd-run-id">' + esc(run.RUN_ID) + '</div>' +
        '<div class="rd-subtitle">' +
          '<span>' + esc(run.WINE) + ' ' + esc(String(run.VINTAGE)) + '</span>' +
          statusBadge(run.STATUS) +
        '</div>' +
      '</div>' +

      '<div class="rd-body">' +

        '<div class="rd-card">' +
          '<div class="rd-card-title">Run Details</div>' +
          detailRows +
        '</div>' +

        '<div>' +
          '<div class="rd-card">' +
            '<div class="rd-card-title">Actions</div>' +
            _buildActionPanel(run) +
            '<div id="rd-spinner" class="rd-spinner">Working...</div>' +
            '<div id="rd-action-error" class="rd-action-error"></div>' +
          '</div>' +
        '</div>' +

      '</div>';
  }

  function _approvalBadge(val) {
    if (val === 'Yes') return '<span style="color:#15803d;font-weight:600">Yes</span>';
    return '<span style="color:#94a3b8">No</span>';
  }

  function _buildActionPanel(run) {
    var runId = run.RUN_ID;

    if (run.STATUS === 'Active') {
      return '<div class="rd-action-group">' +
        '<button id="send-approval-btn" class="btn-action btn-action-primary" ' +
          'onclick="doSendForApproval(\'' + esc(runId) + '\')">' +
          'Send for Approval' +
        '</button>' +
      '</div>';
    }

    if (run.STATUS === 'Pending Approval') {
      var wmDone  = run.WINEMAKER_APPROVED === 'Yes';
      var labDone = run.LAB_APPROVED === 'Yes';
      return '<div class="rd-action-group">' +
        '<div class="rd-approval-row">' +
          '<span>Winemaker approval</span>' +
          (wmDone
            ? '<span class="rd-approval-done">Done</span>'
            : '<span class="rd-approval-pending">Pending</span>') +
        '</div>' +
        '<div class="rd-approval-row">' +
          '<span>Lab approval</span>' +
          (labDone
            ? '<span class="rd-approval-done">Done</span>'
            : '<span class="rd-approval-pending">Pending</span>') +
        '</div>' +
      '</div>' +
      '<div class="rd-action-group">' +
        '<button id="approve-wm-btn" class="btn-action ' +
          (wmDone ? 'btn-action-muted' : 'btn-action-primary') + '" ' +
          (wmDone ? 'disabled ' : '') +
          'onclick="doApproveRun(\'' + esc(runId) + '\', \'WINEMAKER\', \'approve-wm-btn\')">' +
          'Approve -- Winemaker' +
        '</button>' +
        '<button id="approve-lab-btn" class="btn-action ' +
          (labDone ? 'btn-action-muted' : 'btn-action-secondary') + '" ' +
          (labDone ? 'disabled ' : '') +
          'onclick="doApproveRun(\'' + esc(runId) + '\', \'LAB\', \'approve-lab-btn\')">' +
          'Approve -- Lab Manager' +
        '</button>' +
      '</div>';
    }

    if (run.STATUS === 'Approved') {
      var numSessions   = Number(run.NUM_SESSIONS) || 0;
      var canComplete   = numSessions > 0;
      return '<div class="rd-action-group">' +
        '<button id="start-prod-btn" class="btn-action btn-action-primary" ' +
          'onclick="doStartProduction(\'' + esc(runId) + '\')">' +
          'Start Production' +
        '</button>' +
        '<button id="complete-run-btn" class="btn-action btn-action-secondary" ' +
          (!canComplete ? 'disabled title="No completed sessions yet" ' : '') +
          'onclick="doCompleteRun(\'' + esc(runId) + '\')">' +
          'Run Complete' +
        '</button>' +
        (!canComplete
          ? '<div style="font-size:11px;color:#94a3b8;text-align:center">Complete at least one production session before marking run complete.</div>'
          : '') +
      '</div>';
    }

    if (run.STATUS === 'In Production') {
      var startTime = run.PRODUCTION_START_TIME ? formatDisplayDate(run.PRODUCTION_START_TIME) : '--';
      return '<div class="rd-session-info">' +
        'Production in progress<br>' +
        'Started: ' + startTime +
      '</div>' +
      '<div class="rd-action-group">' +
        '<button id="end-prod-btn" class="btn-action btn-action-danger" ' +
          'onclick="doEndProduction(\'' + esc(runId) + '\')">' +
          'End Production' +
        '</button>' +
      '</div>';
    }

    if (run.STATUS === 'Completed') {
      var reportLink = (run.REPORT_LINK && run.REPORT_LINK !== 'PENDING')
        ? '<br><a href="' + esc(run.REPORT_LINK) + '" target="_blank" style="color:#15803d">Open Bottling Report</a>'
        : '';
      var folderLink = (run.FOLDER_LINK && run.FOLDER_LINK !== 'PENDING')
        ? '<br><a href="' + esc(run.FOLDER_LINK) + '" target="_blank" style="color:#15803d">Open Drive Folder</a>'
        : '';
      return '<div class="rd-complete-msg">' +
        '<strong>Run Completed</strong>' + reportLink + folderLink +
      '</div>';
    }

    return '<div style="color:#94a3b8;font-size:13px;">No actions available.</div>';
  }

  // --- Action handlers ---

  function doSendForApproval(runId) {
    _rdAction('send-approval-btn', runId, function(sh, fh) {
      google.script.run
        .withSuccessHandler(sh)
        .withFailureHandler(fh)
        .serverSendForApproval(runId);
    });
  }

  function doApproveRun(runId, role, btnId) {
    _rdAction(btnId, runId, function(sh, fh) {
      google.script.run
        .withSuccessHandler(sh)
        .withFailureHandler(fh)
        .serverApproveRun(runId, role);
    });
  }

  function doStartProduction(runId) {
    _rdAction('start-prod-btn', runId, function(sh, fh) {
      google.script.run
        .withSuccessHandler(sh)
        .withFailureHandler(fh)
        .serverStartProduction(runId);
    });
  }

  function doEndProduction(runId) {
    _rdAction('end-prod-btn', runId, function(sh, fh) {
      google.script.run
        .withSuccessHandler(sh)
        .withFailureHandler(fh)
        .serverEndProduction(runId);
    });
  }

  function doCompleteRun(runId) {
    _rdAction('complete-run-btn', runId, function(sh, fh) {
      google.script.run
        .withSuccessHandler(sh)
        .withFailureHandler(fh)
        .serverCompleteRun(runId);
    });
  }

  // Generic action runner: disables button, shows spinner, refreshes on success.
  function _rdAction(btnId, runId, callFn) {
    var btn     = document.getElementById(btnId);
    var spinner = document.getElementById('rd-spinner');
    var errEl   = document.getElementById('rd-action-error');

    if (btn)     btn.disabled = true;
    if (spinner) spinner.style.display = 'block';
    if (errEl)   errEl.style.display = 'none';

    callFn(
      function(result) {
        if (spinner) spinner.style.display = 'none';
        if (!result || !result.success) {
          if (btn) btn.disabled = false;
          if (errEl) {
            errEl.textContent = (result && result.error) ? result.error : 'Unknown error';
            errEl.style.display = 'block';
          }
          return;
        }
        viewRun(runId);
      },
      function(err) {
        if (spinner) spinner.style.display = 'none';
        if (btn) btn.disabled = false;
        if (errEl) {
          errEl.textContent = 'Server error: ' + String(err);
          errEl.style.display = 'block';
        }
      }
    );
  }
</script>
