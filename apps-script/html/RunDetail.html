<style>
  .rd-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--wine-mid);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    padding: 0;
    margin-bottom: 20px;
    text-decoration: none;
  }
  .rd-back:hover { text-decoration: underline; }

  .rd-header { margin-bottom: 24px; }
  .rd-run-id {
    font-size: 26px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.2;
  }
  .rd-subtitle {
    font-size: 15px;
    color: var(--muted);
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .rd-body {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 20px;
    align-items: start;
  }

  .rd-card {
    background: var(--white);
    border-radius: 8px;
    border: 1px solid var(--border);
    padding: 20px 24px;
  }
  .rd-card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    font-style: italic;
    color: var(--wine-mid);
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .rd-field {
    display: flex;
    padding: 7px 0;
    border-bottom: 1px solid var(--cream);
    font-size: 13px;
  }
  .rd-field:last-child { border-bottom: none; }
  .rd-field-label {
    width: 160px;
    flex-shrink: 0;
    color: var(--muted);
    font-weight: 500;
  }
  .rd-field-value { color: var(--ink); }
  .rd-field-value a { color: var(--wine-mid); }

  .rd-action-group { display: flex; flex-direction: column; gap: 8px; }
  .rd-action-group + .rd-action-group {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--cream-mid);
  }
  .btn-action {
    width: 100%;
    padding: 9px 14px;
    border-radius: 5px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    text-align: center;
  }
  .btn-action:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-action-primary   { background: var(--wine); color: var(--white); border-color: var(--wine); }
  .btn-action-secondary { background: var(--white); color: var(--ink); border-color: var(--border); }
  .btn-action-danger    { background: oklch(55% 0.11 10); color: var(--white); border-color: oklch(55% 0.11 10); }
  .btn-action-muted     { background: var(--cream-mid); color: var(--muted); border-color: var(--border); }

  .rd-spinner {
    display: none;
    text-align: center;
    padding: 8px 0;
    font-size: 12px;
    color: var(--muted);
  }
  .rd-action-error {
    display: none;
    background: oklch(97% 0.02 15);
    color: var(--wine-mid);
    border: 1px solid oklch(88% 0.06 15);
    border-radius: 5px;
    padding: 8px 12px;
    font-size: 12px;
    margin-top: 6px;
  }
  .rd-complete-msg {
    background: oklch(95% 0.04 145);
    color: oklch(40% 0.13 145);
    border: 1px solid oklch(88% 0.05 145);
    border-radius: 6px;
    padding: 12px;
    font-size: 13px;
    text-align: center;
  }
  .rd-session-info {
    background: oklch(96% 0.04 70);
    border: 1px solid oklch(88% 0.08 70);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 12px;
    color: oklch(45% 0.12 55);
    margin-bottom: 10px;
  }
  .rd-approval-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    padding: 3px 0;
  }
  .rd-approval-done    { color: oklch(40% 0.13 145); font-weight: 600; }
  .rd-approval-pending { color: oklch(45% 0.12 55); }
</style>

<script>
  var _rdCurrentRunId = null;

  function _buildModalTopSection(run) {
    var runId = run.RUN_ID;
    var buttons = [];

    if (run.STATUS === 'Pending Approval') {
      var wmDone = run.WINEMAKER_APPROVED === 'Yes';
      var labDone = run.LAB_APPROVED === 'Yes';
      return '<div class="modal-section-title">Approvals</div>' +
        '<div class="modal-top-actions">' +
          '<button id="approve-wm-btn" class="btn-modal ' + (wmDone ? 'btn-modal-muted' : 'btn-modal-approve') + '" ' +
            (wmDone ? 'disabled ' : '') +
            'onclick="doApproveRun(\'' + esc(runId) + '\', \'WINEMAKER\', \'approve-wm-btn\')">Approve &mdash; Winemaker</button>' +
          '<button id="approve-lab-btn" class="btn-modal ' + (labDone ? 'btn-modal-muted' : 'btn-modal-approve') + '" ' +
            (labDone ? 'disabled ' : '') +
            'onclick="doApproveRun(\'' + esc(runId) + '\', \'LAB\', \'approve-lab-btn\')">Approve &mdash; Lab Manager</button>' +
        '</div>';
    }

    if (run.STATUS === 'Active') {
      buttons.push('<button class="btn-modal btn-modal-form" onclick="showFormSection(\'lab-pre-bot\',{runId:\'' + esc(runId) + '\'})">&#128203; Lab Pre-Bot Check</button>');
      buttons.push('<button class="btn-modal btn-modal-form" onclick="showFormSection(\'warehouse\',{runId:\'' + esc(runId) + '\'})">&#128203; Warehouse Check</button>');
    }

    if (run.STATUS === 'Approved') {
      var nextSessionId = esc(runId + '-Day' + ((Number(run.NUM_SESSIONS) || 0) + 1));
      buttons.push('<button class="btn-modal btn-modal-form" onclick="showFormSection(\'day-before\',{runId:\'' + esc(runId) + '\'})">&#128203; Day Before Check</button>');
      buttons.push('<button class="btn-modal btn-modal-form" onclick="showFormSection(\'day-of-check\',{runId:\'' + esc(runId) + '\',sessionId:\'' + nextSessionId + '\',role:\'Operator\'})">&#128203; Day Of Check &mdash; Operator</button>');
      buttons.push('<button class="btn-modal btn-modal-form" onclick="showFormSection(\'day-of-check\',{runId:\'' + esc(runId) + '\',sessionId:\'' + nextSessionId + '\',role:\'Lab\'})">&#128203; Day Of Check &mdash; Lab</button>');
    }

    if (run.STATUS === 'In Production') {
      buttons.push('<button class="btn-modal btn-modal-form" onclick="showFormSection(\'hourly-check\',{runId:\'' + esc(runId) + '\',role:\'Operator\'})">&#128203; Hourly Check &mdash; Operator</button>');
      buttons.push('<button class="btn-modal btn-modal-form" onclick="showFormSection(\'hourly-check\',{runId:\'' + esc(runId) + '\',role:\'Lab\'})">&#128203; Hourly Check &mdash; Lab</button>');
      buttons.push('<button class="btn-modal btn-modal-form" onclick="showFormSection(\'staff-log\',{runId:\'' + esc(runId) + '\'})">&#128203; Staff Log</button>');
    }

    if (run.STATUS === 'Completed') {
      buttons.push('<button class="btn-modal btn-modal-form" onclick="showFormSection(\'staff-log\',{runId:\'' + esc(runId) + '\'})">&#128203; Staff Log</button>');
    }

    if (!buttons.length) return '';

    return '<div class="modal-section-title">Forms</div>' +
      '<div class="modal-top-actions">' + buttons.join('') + '</div>';
  }

  function _buildModalApprovalSummary(run) {
    var items = [
      ['Winemaker Approved', run.WINEMAKER_APPROVED === 'Yes'
        ? '<span class="modal-summary-value status-yes">&#10003; Yes</span>'
        : '<span class="modal-summary-value status-no">&#10007; No</span>'],
      ['Lab Approved', run.LAB_APPROVED === 'Yes'
        ? '<span class="modal-summary-value status-yes">&#10003; Yes</span>'
        : '<span class="modal-summary-value status-no">&#10007; No</span>'],
      ['Warehouse Approved', run.WAREHOUSE_APPROVED === 'Yes'
        ? '<span class="modal-summary-value status-yes">&#10003; Yes</span>'
        : '<span class="modal-summary-value status-no">&#10007; No</span>'],
      ['Sessions Completed', '<span class="modal-summary-value">' + esc(String(run.NUM_SESSIONS || 0)) + '</span>']
    ];

    return '<div class="modal-summary-grid">' +
      items.map(function(item) {
        return '<div class="modal-summary-cell">' +
          '<div class="modal-summary-label">' + item[0] + '</div>' +
          item[1] +
        '</div>';
      }).join('') +
    '</div>';
  }

  function _buildModalBottomActionPanel(run) {
    var runId = run.RUN_ID;
    var buttons = [
      '<button class="btn-modal btn-modal-close" onclick="handleModalClose()">Close</button>'
    ];

    if (run.STATUS === 'Active') {
      buttons.push(
        '<button id="send-approval-btn" class="btn-modal btn-modal-action" onclick="doSendForApproval(\'' + esc(runId) + '\')">Send for Approval &rarr;</button>'
      );
    }

    if (run.STATUS === 'Approved') {
      var numSessions = Number(run.NUM_SESSIONS) || 0;
      buttons.push(
        '<button id="start-prod-btn" class="btn-modal btn-modal-action" onclick="doStartProduction(\'' + esc(runId) + '\')">Start Production &rarr;</button>'
      );
      buttons.push(
        '<button id="complete-run-btn" class="btn-modal ' + (numSessions > 0 ? 'btn-modal-danger' : 'btn-modal-muted') + '" ' +
          (numSessions > 0 ? '' : 'disabled title="Complete at least one production session before marking run complete." ') +
          'onclick="doCompleteRun(\'' + esc(runId) + '\')">Run Complete</button>'
      );
    }

    if (run.STATUS === 'In Production') {
      buttons.push(
        '<button id="end-prod-btn" class="btn-modal btn-modal-danger" onclick="doEndProduction(\'' + esc(runId) + '\')">End Production</button>'
      );
    }

    return buttons.join('');
  }

  function renderRunDetail(run) {
    _rdCurrentRunId = run.RUN_ID;
    document.getElementById('run-detail-content').innerHTML = _buildRunDetailHtml(run);
  }

  function _buildRunDetailHtml(run) {
    var bottlingDate = run.BOTTLING_DATE ? formatDisplayDate(run.BOTTLING_DATE) : '--';
    var createdDate  = run.CREATED_DATE  ? formatDisplayDate(run.CREATED_DATE)  : '--';

    var folderCell = (run.FOLDER_LINK && run.FOLDER_LINK !== 'PENDING' && run.FOLDER_LINK !== '')
      ? '<a href="' + esc(run.FOLDER_LINK) + '" target="_blank">Open folder</a>'
      : '<span style="color:#94a3b8">PENDING</span>';

    var reportCell = (run.REPORT_LINK && run.REPORT_LINK !== 'PENDING' && run.REPORT_LINK !== '')
      ? '<a href="' + esc(run.REPORT_LINK) + '" target="_blank">Open report</a>'
      : '<span style="color:#94a3b8">PENDING</span>';

    var detailRows = [
      ['Vintrace ID',         esc(run.VINTRACE_ID   || '--')],
      ['Tank Numbers',        esc(run.TANK_NUMBERS   || '--')],
      ['Volume (L)',          esc(String(run.VOLUME  || '--'))],
      ['Bottling Date',       bottlingDate],
      ['Number of Days',      esc(String(run.NUM_DAYS || '--'))],
      ['Winemaker',           esc(run.WINEMAKER      || '--')],
      ['Created',             createdDate],
      ['Winemaker Approved',  _approvalBadge(run.WINEMAKER_APPROVED)],
      ['Lab Approved',        _approvalBadge(run.LAB_APPROVED)],
      ['Warehouse Approved',  _approvalBadge(run.WAREHOUSE_APPROVED)],
      ['Sessions Completed',  esc(String(run.NUM_SESSIONS || 0))],
      ['Report',              reportCell],
      ['Drive Folder',        folderCell]
    ].map(function(pair) {
      return '<div class="rd-field">' +
        '<span class="rd-field-label">' + pair[0] + '</span>' +
        '<span class="rd-field-value">' + pair[1] + '</span>' +
        '</div>';
    }).join('');

    return '' +
      '<button class="rd-back" onclick="goToDashboard()">&#8592; Back to Dashboard</button>' +
      '<div class="rd-header">' +
        '<div class="rd-run-id">' + esc(run.RUN_ID) + '</div>' +
        '<div class="rd-subtitle">' +
          '<span style="text-transform:uppercase">' + esc(run.WINE) + '</span> ' + esc(String(run.VINTAGE)) +
          statusBadge(run.STATUS) +
        '</div>' +
      '</div>' +
      '<div class="rd-body">' +
        '<div class="rd-card">' +
          '<div class="rd-card-title">Run Details</div>' +
          detailRows +
        '</div>' +
        '<div>' +
          '<div class="rd-card">' +
            '<div class="rd-card-title">Actions</div>' +
            _buildActionPanel(run) +
            '<div id="rd-spinner" class="rd-spinner">Working...</div>' +
            '<div id="rd-action-error" class="rd-action-error"></div>' +
          '</div>' +
        '</div>' +
      '</div>';
  }

  function _approvalBadge(val) {
    if (val === 'Yes') return '<span style="color:oklch(40% 0.13 145);font-weight:600">Yes</span>';
    return '<span style="color:var(--muted)">No</span>';
  }

  function _buildActionPanel(run) {
    var runId = run.RUN_ID;

    if (run.STATUS === 'Active') {
      return '<div class="rd-action-group">' +
          '<button id="send-approval-btn" class="btn-action btn-action-primary" ' +
            'onclick="doSendForApproval(\'' + esc(runId) + '\')">' +
            'Send for Approval' +
          '</button>' +
        '</div>' +
        '<div class="rd-action-group">' +
          '<button class="btn-action btn-action-secondary" onclick="showFormSection(\'lab-pre-bot\',{runId:\'' + esc(runId) + '\'})">Lab Pre-Bot Check</button>' +
          '<button class="btn-action btn-action-secondary" onclick="showFormSection(\'warehouse\',{runId:\'' + esc(runId) + '\'})">Warehouse Check</button>' +
        '</div>';
    }

    if (run.STATUS === 'Pending Approval') {
      var wmDone  = run.WINEMAKER_APPROVED === 'Yes';
      var labDone = run.LAB_APPROVED === 'Yes';
      return '<div class="rd-action-group">' +
          '<div class="rd-approval-row">' +
            '<span>Winemaker approval</span>' +
            (wmDone ? '<span class="rd-approval-done">Done</span>' : '<span class="rd-approval-pending">Pending</span>') +
          '</div>' +
          '<div class="rd-approval-row">' +
            '<span>Lab approval</span>' +
            (labDone ? '<span class="rd-approval-done">Done</span>' : '<span class="rd-approval-pending">Pending</span>') +
          '</div>' +
        '</div>' +
        '<div class="rd-action-group">' +
          '<button id="approve-wm-btn" class="btn-action ' + (wmDone ? 'btn-action-muted' : 'btn-action-primary') + '" ' +
            (wmDone ? 'disabled ' : '') +
            'onclick="doApproveRun(\'' + esc(runId) + '\', \'WINEMAKER\', \'approve-wm-btn\')">Approve -- Winemaker</button>' +
          '<button id="approve-lab-btn" class="btn-action ' + (labDone ? 'btn-action-muted' : 'btn-action-secondary') + '" ' +
            (labDone ? 'disabled ' : '') +
            'onclick="doApproveRun(\'' + esc(runId) + '\', \'LAB\', \'approve-lab-btn\')">Approve -- Lab Manager</button>' +
        '</div>';
    }

    if (run.STATUS === 'Approved') {
      var numSessions   = Number(run.NUM_SESSIONS) || 0;
      var canComplete   = numSessions > 0;
      var nextSessionId = esc(runId + '-Day' + (numSessions + 1));
      return '<div class="rd-action-group">' +
          '<button id="start-prod-btn" class="btn-action btn-action-primary" ' +
            'onclick="doStartProduction(\'' + esc(runId) + '\')">Start Production</button>' +
          '<button id="complete-run-btn" class="btn-action btn-action-secondary" ' +
            (!canComplete ? 'disabled title="No completed sessions yet" ' : '') +
            'onclick="doCompleteRun(\'' + esc(runId) + '\')">Run Complete</button>' +
          (!canComplete ? '<div style="font-size:11px;color:var(--muted);text-align:center">Complete at least one production session before marking run complete.</div>' : '') +
        '</div>' +
        '<div class="rd-action-group">' +
          '<button class="btn-action btn-action-secondary" onclick="showFormSection(\'day-before\',{runId:\'' + esc(runId) + '\'})">Day Before Check</button>' +
          '<button class="btn-action btn-action-secondary" onclick="showFormSection(\'day-of-check\',{runId:\'' + esc(runId) + '\',sessionId:\'' + nextSessionId + '\',role:\'Operator\'})">Day Of Check -- Operator</button>' +
          '<button class="btn-action btn-action-secondary" onclick="showFormSection(\'day-of-check\',{runId:\'' + esc(runId) + '\',sessionId:\'' + nextSessionId + '\',role:\'Lab\'})">Day Of Check -- Lab</button>' +
        '</div>';
    }

    if (run.STATUS === 'In Production') {
      var startTime = run.PRODUCTION_START_TIME ? formatDisplayDate(run.PRODUCTION_START_TIME) : '--';
      return '<div class="rd-session-info">Production in progress<br>Started: ' + startTime + '</div>' +
        '<div class="rd-action-group">' +
          '<button id="end-prod-btn" class="btn-action btn-action-danger" ' +
            'onclick="doEndProduction(\'' + esc(runId) + '\')">End Production</button>' +
        '</div>' +
        '<div class="rd-action-group">' +
          '<button class="btn-action btn-action-secondary" onclick="showFormSection(\'hourly-check\',{runId:\'' + esc(runId) + '\',role:\'Operator\'})">Hourly Check -- Operator</button>' +
          '<button class="btn-action btn-action-secondary" onclick="showFormSection(\'hourly-check\',{runId:\'' + esc(runId) + '\',role:\'Lab\'})">Hourly Check -- Lab</button>' +
          '<button class="btn-action btn-action-secondary" onclick="showFormSection(\'staff-log\',{runId:\'' + esc(runId) + '\'})">Staff Log</button>' +
        '</div>';
    }

    if (run.STATUS === 'Completed') {
      var reportLink = (run.REPORT_LINK && run.REPORT_LINK !== 'PENDING')
        ? '<br><a href="' + esc(run.REPORT_LINK) + '" target="_blank" style="color:oklch(40% 0.13 145)">Open Bottling Report</a>'
        : '';
      var folderLink = (run.FOLDER_LINK && run.FOLDER_LINK !== 'PENDING')
        ? '<br><a href="' + esc(run.FOLDER_LINK) + '" target="_blank" style="color:oklch(40% 0.13 145)">Open Drive Folder</a>'
        : '';
      return '<div class="rd-complete-msg"><strong>Run Completed</strong>' + reportLink + folderLink + '</div>' +
        '<div class="rd-action-group">' +
          '<button class="btn-action btn-action-secondary" onclick="showFormSection(\'staff-log\',{runId:\'' + esc(runId) + '\'})">Staff Log</button>' +
        '</div>';
    }

    return '<div style="color:var(--muted);font-size:13px;">No actions available.</div>';
  }

  // --- Form navigation ---

  // Calls the render function for a check form, replacing run-detail-content.
  function showFormSection(formName, params) {
    _modalState = { view: 'form', runId: params.runId, formName: formName };
    if (formName === 'lab-pre-bot')  { renderLabPreBot(params.runId);                                  return; }
    if (formName === 'warehouse')    { renderWarehouseCheck(params.runId);                             return; }
    if (formName === 'day-before')   { renderDayBeforeCheck(params.runId);                             return; }
    if (formName === 'day-of-check') { renderDayOfCheck(params.runId, params.sessionId, params.role); return; }
    if (formName === 'hourly-check') { renderHourlyCheck(params.runId, params.role);                  return; }
    if (formName === 'staff-log')    { renderStaffRunLog(params.runId);                                return; }
  }

  // Shared helper used by form build functions to generate <option> elements.
  function _staffOptions(staff, roleFilter) {
    var html = '<option value="">-- Select --</option>';
    if (!staff || !staff.length) return html;
    for (var i = 0; i < staff.length; i++) {
      if (!roleFilter || staff[i].role === roleFilter) {
        html += '<option value="' + esc(staff[i].name) + '">' + esc(staff[i].name) + '</option>';
      }
    }
    return html;
  }

  // --- Action handlers ---

  function doSendForApproval(runId) {
    _rdAction('send-approval-btn', runId, function(sh, fh) {
      google.script.run.withSuccessHandler(sh).withFailureHandler(fh).serverSendForApproval(runId);
    });
  }

  function doApproveRun(runId, role, btnId) {
    _rdAction(btnId, runId, function(sh, fh) {
      google.script.run.withSuccessHandler(sh).withFailureHandler(fh).serverApproveRun(runId, role);
    });
  }

  function doStartProduction(runId) {
    _rdAction('start-prod-btn', runId, function(sh, fh) {
      google.script.run.withSuccessHandler(sh).withFailureHandler(fh).serverStartProduction(runId);
    });
  }

  function doEndProduction(runId) {
    _rdAction('end-prod-btn', runId, function(sh, fh) {
      google.script.run.withSuccessHandler(sh).withFailureHandler(fh).serverEndProduction(runId);
    });
  }

  function doCompleteRun(runId) {
    _rdAction('complete-run-btn', runId, function(sh, fh) {
      google.script.run.withSuccessHandler(sh).withFailureHandler(fh).serverCompleteRun(runId);
    });
  }

  // Generic action runner: disables button, shows spinner, refreshes on success.
  function _rdAction(btnId, runId, callFn) {
    var btn     = document.getElementById(btnId);
    var spinner = document.getElementById('rd-spinner');
    var errEl   = document.getElementById('rd-action-error');
    if (btn)     btn.disabled = true;
    if (spinner) spinner.style.display = 'block';
    if (errEl)   errEl.style.display   = 'none';
    callFn(
      function(result) {
        if (spinner) spinner.style.display = 'none';
        if (!result || !result.success) {
          if (btn) btn.disabled = false;
          if (errEl) {
            errEl.textContent   = (result && result.error) ? result.error : 'Unknown error';
            errEl.style.display = 'block';
          }
          return;
        }
        viewRun(runId);
      },
      function(err) {
        if (spinner) spinner.style.display = 'none';
        if (btn) btn.disabled = false;
        if (errEl) {
          errEl.textContent   = 'Server error: ' + String(err);
          errEl.style.display = 'block';
        }
      }
    );
  }
</script>
